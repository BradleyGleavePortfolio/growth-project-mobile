name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install

      - name: Validate release readiness (placeholders, store URLs, version)
        # Early-fail gate — runs first so placeholder regressions are caught
        # before slower typecheck/lint/test steps. In --release mode the
        # validator exits zero even when known-pending items (SHA256
        # fingerprint, null store URLs) are present; those are written to
        # RELEASE_BLOCKER.md instead. Genuinely broken config (wrong package
        # name, malformed URL, missing plugin) always exits non-zero.
        run: npm run validate:release

      - name: Validate release readiness (placeholders, store URLs, version)
        # Early-fail gate — runs first so placeholder regressions are caught
        # before slower typecheck/lint/test steps. In --release mode the
        # validator exits zero even when known-pending items (SHA256
        # fingerprint, null store URLs) are present; those are written to
        # RELEASE_BLOCKER.md instead. Genuinely broken config (wrong package
        # name, malformed URL, missing plugin) always exits non-zero.
        run: npm run validate:release

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Validate app config
        run: npm run validate:config --if-present

      - name: Test
        run: npm test --if-present -- --ci --passWithNoTests
