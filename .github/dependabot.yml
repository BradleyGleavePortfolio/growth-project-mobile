version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
      expo:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
      react-navigation:
        patterns:
          - "@react-navigation/*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
